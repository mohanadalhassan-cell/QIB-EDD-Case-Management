# ============================================================================
# NETLIFY DEPLOYMENT CONFIGURATION - إعدادات النشر على Netlify
# ============================================================================
# تكوين شامل لنشر نظام EDD/QIB على منصة Netlify

# ============================================================================
# NETLIFY DEPLOYMENT CONFIGURATION
# ============================================================================
# Static site deployment for Simplify Governance Platform

[build]
  # Publish directory contains all the HTML/CSS/JS files
  publish = "edd_system"
  # No build command needed for static files
  command = ""

  
# ============================================================================
# ENVIRONMENT VARIABLES FOR PRODUCTION
# ============================================================================
[build.environment]
  NODE_VERSION = "18.16.0"
  NODE_ENV = "production"
  NPM_VERSION = "9.6.4"

# ============================================================================
# NETLIFY DEV (LOCAL DEVELOPMENT)
# ============================================================================
[dev]
  command = "npm run dev"
  port = 8585
  targetPort = 8585
  # Enable autorefresh when files change
  autoLaunch = true

# ============================================================================
# REDIRECTS & REWRITES
# ============================================================================
# API requests would go here if needed
# [[redirects]]
#   from = "/api/*"
#   to = "/.netlify/functions/api/:splat"
#   status = 200

# NOTE: SPA redirect NOT used - this is a multi-page application
# where each .html file is a standalone route

# ============================================================================
# HEADERS & SECURITY
# ============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.example.com"
    
    # Additional Security Headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # Cache Control
    Cache-Control = "public, max-age=3600"

# ============================================================================
# CACHE HEADERS FOR STATIC ASSETS
# ============================================================================
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================================
# HTML PAGES (No Cache)
# ============================================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ============================================================================
# CONTEXT-SPECIFIC SETTINGS
# ============================================================================
[context.production]
  command = "npm run build"
  environment = { NODE_ENV = "production", API_URL = "https://api.qib.example.com" }

[context.deploy-preview]
  command = "npm run build"
  environment = { NODE_ENV = "staging", API_URL = "https://staging-api.qib.example.com" }

[context.branch-deploy]
  command = "npm run build"
  environment = { NODE_ENV = "development", API_URL = "http://localhost:8585" }

# ============================================================================
# CONTINUOUS DEPLOYMENT (CI/CD)
# ============================================================================
[settings]
  #Netlify ID (set automatically when linked)
  ID = "qib-edd-system"
  
  # Function Runtime
  functions = "functions"
  
  # Publish directory
  publish = "edd_system"

# ============================================================================
# BUILD PLUGINS (Optional)
# ============================================================================
# These plugins enhance the build process

# [[plugins]]
#   package = "@netlify/plugin-sitemap"
#   [plugins.inputs]
#     baseUrl = "https://qib-edd.netlify.app"
#     prettyURLs = true

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ============================================================================
# INCOMING WEBHOOKS (For integrations)
# ============================================================================
# Webhook configurations can be set via Netlify UI
# [integrations]
#   webhook = "https://your-webhook-endpoint.com/deploy"

# ============================================================================
# NOTIFICATIONS
# ============================================================================
[context.production.deploy_notification]
  subject = "✅ QIB EDD System Deployed to Production"
  message = "Your site has been deployed to production. Review: ${DEPLOY_URL}"

# ============================================================================
# EMAIL NOTIFICATIONS (Set in Netlify UI)
# ============================================================================
# Build failures and deployment statuses are configured in Netlify dashboard

# ============================================================================
# NOTES FOR DEPLOYMENT
# ============================================================================
# 
# 1. Connect git repository to Netlify:
#    - Go to https://app.netlify.com
#    - Click "New site from Git"
#    - Choose GitHub repository: your-org/EDD_QIB
#    - Configure build settings (or use this netlify.toml)
#
# 2. Set environment variables in Netlify UI:
#    Build Environment Variables:
#    - NODE_ENV: production
#    - API_BASE_URL: https://api.qib.example.com
#    - JWT_SECRET: (your secret key)
#
# 3. Deploy triggers:
#    - Manual deploy: Click "Deploy site" button
#    - Auto deploy: Push to main branch
#    - Deploy preview: Create pull request
#
# 4. Custom domain:
#    - Go to Domain Settings
#    - Add custom domain (e.g., edd.qib.qa)
#    - Configure DNS records
#
# 5. SSL/HTTPS:
#    - Automatically enabled for all Netlify domains
#    - LetsEncrypt certificates for custom domains
#
# 6. Functions (Serverless):
#    - Place serverless functions in /functions folder
#    - Deploy automatically with each push
#    - Available at /.netlify/functions/{function-name}
#
# ============================================================================
