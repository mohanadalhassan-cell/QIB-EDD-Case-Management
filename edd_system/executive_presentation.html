<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QIB — Executive Strategic Briefing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23D4AF37'/><text x='16' y='22' font-size='16' font-weight='bold' fill='%230a1f3d' text-anchor='middle' font-family='system-ui'>Q</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #0a1628;
      --navy-light: #0f1d32;
      --gold: #D4AF37;
      --gold-dim: rgba(212,175,55,0.15);
      --cyan: #00D4FF;
      --white-90: rgba(255,255,255,0.9);
      --white-70: rgba(255,255,255,0.7);
      --white-50: rgba(255,255,255,0.5);
      --white-20: rgba(255,255,255,0.2);
      --white-10: rgba(255,255,255,0.1);
      --white-05: rgba(255,255,255,0.05);
      --red: #FF4D6A;
      --green: #00E676;
      --orange: #FF9800;
      --slide-max: 1100px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--navy);
      color: var(--white-90);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ========================================
       PRESENTATION SHELL
    ======================================== */
    .pres-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, #080d18 0%, #0f1d32 40%, #0a1628 100%);
      position: relative;
    }

    /* Ambient background effects */
    .pres-shell::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(212,175,55,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .pres-shell::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -20%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(0,212,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ========================================
       TOP BAR
    ======================================== */
    .top-bar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(0,0,0,0.35);
      border-bottom: 1px solid var(--white-10);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .qib-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--gold), #c49b2c);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: var(--navy);
      letter-spacing: -1px;
    }

    .top-bar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--white-70);
      letter-spacing: 0.5px;
    }

    .top-bar-title span {
      color: var(--gold);
      font-weight: 700;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .classification-badge {
      padding: 4px 14px;
      background: rgba(255,77,106,0.12);
      border: 1px solid rgba(255,77,106,0.3);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .slide-counter {
      font-size: 13px;
      color: var(--white-50);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .slide-counter .current {
      color: var(--gold);
      font-weight: 700;
      font-size: 16px;
    }

    .btn-exit {
      width: 36px;
      height: 36px;
      border: 1px solid var(--white-20);
      background: var(--white-05);
      border-radius: 10px;
      color: var(--white-70);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .btn-exit:hover {
      background: rgba(255,77,106,0.15);
      border-color: var(--red);
      color: var(--red);
    }

    /* ========================================
       SLIDE AREA
    ======================================== */
    .slide-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      z-index: 5;
    }

    .slide-viewport {
      width: 100%;
      max-width: var(--slide-max);
      padding: 30px 60px;
      position: relative;
    }

    /* Navigation arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 56px;
      height: 56px;
      border: 1px solid var(--white-10);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      color: var(--white-70);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .nav-arrow:hover {
      background: rgba(212,175,55,0.15);
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-50%) scale(1.08);
    }

    .nav-arrow:disabled {
      opacity: 0.15;
      cursor: default;
      pointer-events: none;
    }

    .nav-arrow.left { left: 24px; }
    .nav-arrow.right { right: 24px; }

    .nav-arrow svg { width: 24px; height: 24px; }

    /* ========================================
       SLIDE CONTENT STYLING
    ======================================== */
    .slide {
      animation: fadeSlide 0.5s ease-out;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--gold-dim);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .slide h1 {
      font-size: 44px;
      font-weight: 800;
      line-height: 1.15;
      color: white;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .slide h1 .gold { color: var(--gold); }
    .slide h1 .cyan { color: var(--cyan); }

    .slide .subtitle {
      font-size: 18px;
      color: var(--white-50);
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 800px;
    }

    .slide .subtitle-ar {
      font-size: 16px;
      color: var(--gold);
      font-weight: 500;
      direction: rtl;
      text-align: right;
      margin-bottom: 32px;
      opacity: 0.8;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    /* Challenge cards */
    .challenge-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .challenge-card {
      background: rgba(255,77,106,0.04);
      border: 1px solid rgba(255,77,106,0.12);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: all 0.3s;
    }

    .challenge-card:hover {
      background: rgba(255,77,106,0.08);
      border-color: rgba(255,77,106,0.25);
      transform: translateY(-2px);
    }

    .challenge-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,77,106,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .challenge-text h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--white-90);
      margin-bottom: 4px;
    }

    .challenge-text p {
      font-size: 12px;
      color: var(--white-50);
      line-height: 1.5;
    }

    /* Impact cards */
    .impact-strip {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .impact-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,152,0,0.08);
      border: 1px solid rgba(255,152,0,0.2);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--orange);
    }

    /* Solution cards */
    .solution-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .solution-card {
      background: rgba(0,212,255,0.04);
      border: 1px solid rgba(0,212,255,0.12);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: all 0.3s;
    }

    .solution-card:hover {
      background: rgba(0,212,255,0.08);
      border-color: rgba(0,212,255,0.25);
      transform: translateY(-2px);
    }

    .solution-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(0,212,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .solution-text h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--white-90);
      margin-bottom: 4px;
    }

    .solution-text p {
      font-size: 12px;
      color: var(--white-50);
      line-height: 1.5;
    }

    /* Capability modules */
    .capability-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 24px;
    }

    .capability-card {
      background: var(--white-05);
      border: 1px solid var(--white-10);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s;
    }

    .capability-card:hover {
      background: rgba(212,175,55,0.06);
      border-color: rgba(212,175,55,0.2);
      transform: translateY(-3px);
    }

    .capability-card .cap-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .capability-card h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--white-90);
      margin-bottom: 6px;
    }

    .capability-card p {
      font-size: 11px;
      color: var(--white-50);
      line-height: 1.5;
    }

    /* Workflow visual */
    .workflow-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .wf-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      min-width: 130px;
    }

    .wf-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid var(--white-20);
      background: var(--white-05);
      transition: all 0.3s;
    }

    .wf-step:hover .wf-circle {
      border-color: var(--gold);
      background: var(--gold-dim);
      transform: scale(1.1);
    }

    .wf-step-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--white-70);
      text-align: center;
    }

    .wf-step-role {
      font-size: 10px;
      color: var(--white-50);
    }

    .wf-arrow {
      font-size: 20px;
      color: var(--gold);
      opacity: 0.5;
      margin-top: -20px;
    }

    /* Security grid */
    .security-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 24px;
    }

    .security-card {
      background: rgba(0,230,118,0.04);
      border: 1px solid rgba(0,230,118,0.12);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s;
    }

    .security-card:hover {
      background: rgba(0,230,118,0.08);
      border-color: rgba(0,230,118,0.25);
      transform: translateY(-2px);
    }

    .security-card .sec-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .security-card h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--white-90);
      margin-bottom: 4px;
    }

    .security-card p {
      font-size: 11px;
      color: var(--white-50);
      line-height: 1.4;
    }

    /* Roadmap timeline */
    .roadmap-timeline {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .roadmap-phase {
      position: relative;
      background: var(--white-05);
      border: 1px solid var(--white-10);
      border-radius: 14px;
      padding: 20px;
      padding-top: 36px;
      transition: all 0.3s;
    }

    .roadmap-phase:hover {
      background: rgba(212,175,55,0.06);
      border-color: rgba(212,175,55,0.2);
      transform: translateY(-2px);
    }

    .phase-badge {
      position: absolute;
      top: -1px;
      left: 16px;
      padding: 4px 12px;
      background: var(--gold);
      color: var(--navy);
      font-size: 10px;
      font-weight: 700;
      border-radius: 0 0 8px 8px;
      letter-spacing: 0.5px;
    }

    .roadmap-phase h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--white-90);
      margin-bottom: 8px;
    }

    .roadmap-phase p {
      font-size: 11px;
      color: var(--white-50);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .roadmap-phase .duration {
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      margin-top: 8px;
    }

    /* KPI metrics */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .kpi-card {
      background: var(--white-05);
      border: 1px solid var(--white-10);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s;
    }

    .kpi-card:hover {
      border-color: rgba(212,175,55,0.3);
      transform: translateY(-2px);
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--white-50);
      font-weight: 500;
    }

    /* Demo launcher */
    .demo-section {
      text-align: center;
      margin-top: 30px;
    }

    .demo-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .demo-card {
      background: var(--white-05);
      border: 1px solid var(--white-10);
      border-radius: 14px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .demo-card:hover {
      background: rgba(0,212,255,0.06);
      border-color: rgba(0,212,255,0.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .demo-card .demo-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .demo-card h4 {
      font-size: 14px;
      font-weight: 600;
      color: white;
      margin-bottom: 6px;
    }

    .demo-card p {
      font-size: 11px;
      color: var(--white-50);
      line-height: 1.5;
    }

    /* Closing statement */
    .closing-section {
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }

    .closing-divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto;
    }

    .closing-quote {
      font-size: 20px;
      font-weight: 500;
      color: var(--white-70);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 24px;
    }

    .closing-quote-ar {
      font-size: 18px;
      color: var(--gold);
      direction: rtl;
      text-align: center;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      line-height: 1.8;
      opacity: 0.9;
      margin-bottom: 32px;
    }

    .closing-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--gold), #c49b2c);
      color: var(--navy);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .closing-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212,175,55,0.3);
    }

    /* ========================================
       BOTTOM PROGRESS
    ======================================== */
    .bottom-bar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid var(--white-10);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .progress-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--white-20);
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      padding: 0;
    }

    .dot:hover { background: var(--white-50); transform: scale(1.2); }

    .dot.active {
      background: var(--gold);
      box-shadow: 0 0 12px rgba(212,175,55,0.5);
      transform: scale(1.3);
    }

    .keyboard-hint {
      font-size: 11px;
      color: var(--white-50);
    }

    .keyboard-hint kbd {
      background: var(--white-10);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
    }

    /* Title slide special */
    .title-slide { text-align: center; }

    .title-slide .qib-emblem {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--gold), #c49b2c);
      border-radius: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(212,175,55,0.25);
    }

    .title-slide h1 {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .title-slide .meta-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 32px;
      font-size: 13px;
      color: var(--white-50);
    }

    .title-slide .meta-info span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .slide h1 { font-size: 32px; }
      .title-slide h1 { font-size: 38px; }
      .slide-viewport { padding: 20px 40px; }
      .nav-arrow { width: 44px; height: 44px; }
      .nav-arrow.left { left: 12px; }
      .nav-arrow.right { right: 12px; }
      .challenge-grid, .solution-grid { grid-template-columns: 1fr; }
      .capability-grid, .security-grid { grid-template-columns: 1fr 1fr; }
      .roadmap-timeline { grid-template-columns: 1fr 1fr; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .demo-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="pres-shell">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="qib-logo">Q</div>
      <div class="top-bar-title"><span>Qatar Islamic Bank</span> — Executive Strategic Briefing</div>
    </div>
    <div class="top-bar-right">
      <div class="classification-badge">CONFIDENTIAL</div>
      <div class="slide-counter"><span class="current" id="currentNum">1</span> / <span id="totalNum">10</span></div>
      <button class="btn-exit" onclick="exitPresentation()" title="Exit (Esc)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- SLIDE AREA -->
  <div class="slide-area">
    <button class="nav-arrow left" id="btnPrev" onclick="prevSlide()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>

    <div class="slide-viewport">
      <div id="slideContent"></div>
    </div>

    <button class="nav-arrow right" id="btnNext" onclick="nextSlide()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="progress-dots" id="progressDots"></div>
    <div class="keyboard-hint">
      <kbd>←</kbd> <kbd>→</kbd> Navigate &nbsp;|&nbsp; <kbd>Esc</kbd> Exit
    </div>
  </div>

</div>

// PRESENTATION ENGINE
// =========================================================
let current = 0;

function init() {
  document.getElementById('totalNum').textContent = slides.length;

  // Build dots
  const dotsContainer = document.getElementById('progressDots');
  dotsContainer.innerHTML = slides.map((_, i) =>
    `<button class="dot ${i === 0 ? 'active' : ''}" onclick="goTo(${i})"></button>`
  ).join('');

  render();
  document.addEventListener('keydown', onKey);
}

function render() {
  const el = document.getElementById('slideContent');
  el.innerHTML = slides[current].render();
  el.querySelector('.slide').style.animation = 'none';
  void el.offsetWidth;
  el.querySelector('.slide').style.animation = 'fadeSlide 0.5s ease-out';

  // Update counter
  document.getElementById('currentNum').textContent = current + 1;

  // Update dots
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));

  // Update arrows
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === slides.length - 1;
}

function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
function goTo(i) { current = i; render(); }

function onKey(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  else if (e.key === 'Escape') { exitPresentation(); }
  else if (e.key === 'Home') { goTo(0); }
  else if (e.key === 'End') { goTo(slides.length - 1); }
}

function exitPresentation() {
  window.location.href = 'presentations.html';
}

function launchDemo(target) {
  const routes = {
    login: 'login.html',
    dashboard: 'dashboard.html',
    case: 'edd_case.html',
    business: 'business_view.html',
    compliance: 'compliance_view.html',
    management: 'management_dashboard.html'
  };
  if (routes[target]) window.location.href = routes[target];
}

// Touch support
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.changedTouches[0].screenX; });
document.addEventListener('touchend', e => {
  const diff = touchX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 60) diff > 0 ? nextSlide() : prevSlide();
});

// Initialize
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
