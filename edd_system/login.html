<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Financial Crime Investigation Platform - Secure Access">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#0a1f3d">
  <title>Financial Crime Investigation Platform - QIB</title>
  
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* CLEAN ENTERPRISE LOGIN DESIGN - MINIMAL & ELEGANT */
    /* ═══════════════════════════════════════════════════════════════ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1f3d;
      color: #ffffff;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* MAIN CONTAINER - TWO COLUMN LAYOUT */
    /* ═══════════════════════════════════════════════════════════════ */

    .login-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* LEFT SIDE: ANIMATED BACKGROUND */
    .login-background {
      flex: 1;
      position: relative;
      background: linear-gradient(135deg, #0a1f3d 0%, #0f2a4d 50%, #051429 100%);
      overflow: hidden;
    }

    /* RIGHT SIDE: LOGIN FORM */
    .login-form-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      background: linear-gradient(135deg, #0f2a4d 0%, #0a1f3d 100%);
      position: relative;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* NETWORK INTELLIGENCE BACKGROUND ANIMATION */
    /* ═══════════════════════════════════════════════════════════════ */

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .network-canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* LOGIN HEADER (System Identity) */
    /* ═══════════════════════════════════════════════════════════════ */

    .login-header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.8s ease;
    }

    .header-title {
      font-size: 32px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .header-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* IDENTITY BADGES (Bank + Vision) */
    /* ═══════════════════════════════════════════════════════════════ */

    .identity-badges {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 50px;
      animation: fadeInUp 0.8s 0.1s ease backwards;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(92, 10, 40, 0.15), rgba(92, 10, 40, 0.08));
      border: 1px solid rgba(92, 10, 40, 0.4);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.3px;
      transition: all 0.3s ease;
    }

    .badge:hover {
      background: linear-gradient(135deg, rgba(92, 10, 40, 0.25), rgba(92, 10, 40, 0.12));
      border-color: rgba(92, 10, 40, 0.6);
    }

    .badge-icon {
      font-size: 14px;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* LOGIN FORM BOX */
    /* ═══════════════════════════════════════════════════════════════ */

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(10, 31, 61, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(92, 10, 40, 0.3);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(92, 10, 40, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s 0.2s ease backwards;
    }

    .login-box h3 {
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: -0.2px;
    }

    /* ───────────────────────────────────────────────────────────── */
    /* FORM GROUPS */
    /* ───────────────────────────────────────────────────────────── */

    .form-group {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .form-input {
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(92, 10, 40, 0.3);
      border-radius: 8px;
      color: #ffffff;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(92, 10, 40, 0.6);
      box-shadow: 0 0 0 3px rgba(92, 10, 40, 0.1);
    }

    /* ───────────────────────────────────────────────────────────── */
    /* ROLE SELECTION GRID */
    /* ───────────────────────────────────────────────────────────── */

    .role-selection {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .role-button {
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(92, 10, 40, 0.3);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .role-button:hover {
      background: rgba(92, 10, 40, 0.2);
      border-color: rgba(92, 10, 40, 0.5);
      color: rgba(255, 255, 255, 0.9);
    }

    .role-button.selected {
      background: linear-gradient(135deg, #5C0A28, #8B1538);
      border-color: #5C0A28;
      color: #ffffff;
      box-shadow: 0 0 15px rgba(92, 10, 40, 0.4);
    }

    /* ───────────────────────────────────────────────────────────── */
    /* LOGIN BUTTON */
    /* ───────────────────────────────────────────────────────────── */

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #5C0A28, #8B1538);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 8px 24px rgba(92, 10, 40, 0.3);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(92, 10, 40, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* SECURITY FOOTER */
    /* ═══════════════════════════════════════════════════════════════ */

    .security-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: linear-gradient(180deg, transparent, rgba(92, 10, 40, 0.1));
      border-top: 1px solid rgba(92, 10, 40, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3px;
      gap: 16px;
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .security-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: rgba(92, 10, 40, 0.8);
      border-radius: 50%;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* ANIMATIONS */
    /* ═══════════════════════════════════════════════════════════════ */

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* ACCESSIBILITY & RESPONSIVENESS */
    /* ═══════════════════════════════════════════════════════════════ */

    @media (max-width: 1024px) {
      .login-container {
        flex-direction: column;
      }

      .login-background {
        display: none;
      }

      .login-form-container {
        min-height: 100vh;
      }
    }

    @media (max-width: 600px) {
      .login-form-container {
        padding: 40px 20px;
      }

      .login-box {
        max-width: 100%;
      }

      .header-title {
        font-size: 24px;
      }

      .login-header {
        margin-bottom: 30px;
      }

      .identity-badges {
        margin-bottom: 30px;
      }

      .security-footer {
        flex-wrap: wrap;
        gap: 8px;
        font-size: 11px;
        padding: 0 10px;
        height: auto;
        min-height: 50px;
      }
    }

    /* High Contrast Mode */
    @media (prefers-contrast: more) {
      .form-input {
        background: #000000;
        border-color: rgba(255, 255, 255, 0.7);
      }

      .login-box {
        border-color: rgba(255, 255, 255, 0.6);
      }
    }

    /* Font Size Adjustment */
    html.font-large .header-title { font-size: 36px; }
    html.font-large .header-subtitle { font-size: 14px; }
    html.font-large .form-label { font-size: 12px; }
    html.font-large .form-input { font-size: 14px; padding: 14px 16px; }
    html.font-large .btn-login { font-size: 13px; padding: 14px; }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LOGIN CONTAINER - TWO COLUMN LAYOUT -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div class="login-container">
    
    <!-- LEFT: ANIMATED NETWORK BACKGROUND -->
    <div class="login-background">
      <div id="particles-js"></div>
    </div>

    <!-- RIGHT: LOGIN FORM -->
    <div class="login-form-container">
      
      <!-- Header: System Identity -->
      <div class="login-header">
        <h1 class="header-title">Financial Crime Investigation Platform</h1>
        <p class="header-subtitle">Enterprise Edition</p>
      </div>

      <!-- Identity Badges: Bank + Vision -->
      <div class="identity-badges">
        <div class="badge">
          <span class="badge-icon">🏦</span>
          <span>Qatar Islamic Bank</span>
        </div>
        <div class="badge">
          <span class="badge-icon">🎯</span>
          <span>Qatar National Vision 2030</span>
        </div>
      </div>

      <!-- Login Form -->
      <div class="login-box">
        <h3>Secure Access</h3>

        <form id="loginForm">
          <!-- Employee ID -->
          <div class="form-group">
            <label class="form-label">Employee ID</label>
            <input 
              type="text" 
              id="employeeId" 
              class="form-input" 
              placeholder="Enter your employee ID"
              required
            >
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Enter your password"
              required
            >
          </div>

          <!-- Role Selection -->
          <div class="form-group">
            <label class="form-label">Role</label>
            <div class="role-selection">
              <button type="button" class="role-button" onclick="selectRole('Analyst')">Analyst</button>
              <button type="button" class="role-button" onclick="selectRole('Investigator')">Investigator</button>
              <button type="button" class="role-button" onclick="selectRole('Manager')">Manager</button>
              <button type="button" class="role-button" onclick="selectRole('Compliance')">Compliance</button>
            </div>
          </div>

          <!-- OTP -->
          <div class="form-group">
            <label class="form-label">OTP Verification</label>
            <input 
              type="text" 
              id="otp" 
              class="form-input" 
              placeholder="Enter 6-digit code"
              maxlength="6"
              required
            >
          </div>

          <!-- Login Button -->
          <button type="submit" class="btn-login">Sign In Securely</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECURITY FOOTER -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div class="security-footer">
    <div class="security-badge">Secure Access</div>
    <div class="security-badge">MFA Protected</div>
    <div class="security-badge">All Sessions Logged</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PARTICLES.JS - NETWORK INTELLIGENCE BACKGROUND -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    // Initialize Particles.js for Network Intelligence Animation
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#5C0A28" },
        shape: { type: "circle" },
        opacity: { 
          value: 0.5, 
          random: true, 
          anim: { enable: true, speed: 0.3, opacity_min: 0.1, sync: false } 
        },
        size: { 
          value: 3, 
          random: true, 
          anim: { enable: false, speed: 40, size_min: 0.1, sync: false } 
        },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#5C0A28",
          opacity: 0.3,
          width: 1
        },
        move: {
          enable: true,
          speed: 1.5,
          direction: "none",
          random: false,
          straight: false,
          out_mode: "out",
          bounce: false,
          attract: { enable: true, rotateX: 600, rotateY: 1200 }
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "grab" },
          onclick: { enable: false, mode: "push" },
          resize: true
        },
        modes: {
          grab: { distance: 200, line_linked: { opacity: 0.6 } },
          bubble: { distance: 400, size: 40, duration: 2, opacity: 8, speed: 3 },
          repulse: { distance: 200, duration: 0.4 },
          push: { particles_nb: 4 },
          remove: { particles_nb: 2 }
        }
      },
      retina_detect: true
    });
  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LOGIN LOGIC -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    // Demo Credentials
    const VALID_CREDENTIALS = {
      'ahmed.thani': 'password123',
      'Demo-2030': 'Qib@2030',
      'admin': 'admin123',
      'QIB2030': 'QIB2030'
    };

    let selectedRole = null;

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-button').forEach(btn => {
        btn.classList.remove('selected');
      });
      event.target.classList.add('selected');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const empId = document.getElementById('employeeId').value.trim();
      const pwd = document.getElementById('password').value;
      const otp = document.getElementById('otp').value;
      const role = selectedRole;

      // Validate
      if (!empId || !pwd) {
        alert('Please enter Employee ID and Password');
        return;
      }

      if (!VALID_CREDENTIALS[empId] || VALID_CREDENTIALS[empId] !== pwd) {
        alert('Invalid credentials.\n\nDemo accounts:\nahmend.thani / password123\nDemo-2030 / Qib@2030\nadmin / admin123\nQIB2030 / QIB2030');
        return;
      }

      if (!role) {
        alert('Please select a role');
        return;
      }

      if (otp.length !== 6 || isNaN(otp)) {
        alert('Invalid OTP. For demo, enter: 123456');
        return;
      }

      // Success - Redirect to Dashboard
      alert(`✅ Welcome ${empId}\nRole: ${role}\n\nRedirecting to dashboard...`);
      // In production, redirect to: window.location.href = 'dashboard.html';
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Alt + T: Text Size
      if (e.altKey && e.key === 't') {
        e.preventDefault();
        const html = document.documentElement;
        html.classList.toggle('font-large');
      }

      // Alt + C: Contrast
      if (e.altKey && e.key === 'c') {
        e.preventDefault();
        document.body.style.filter = document.body.style.filter === 'contrast(1.5)' 
          ? 'contrast(1)' 
          : 'contrast(1.5)';
      }
    });

    // Accessibility: Load saved preferences
    window.addEventListener('load', function() {
      const prefs = JSON.parse(localStorage.getItem('a11yPreferences') || '{}');
      if (prefs.fontSize === 'large') {
        document.documentElement.classList.add('font-large');
      }
    });
  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- DEMO GUIDANCE SYSTEM -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script src="js/demo-guidance.js"></script>
</body>
</html>
