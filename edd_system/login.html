<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDD Governance</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f3a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.login-box {
    background: #102b4e;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
    color: #fff;
}

/* Title */
.title {
    font-size: 18px;
    margin-bottom: 20px;
    color: #00d4ff;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #1e3a5f;
    color: white;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #00d4ff, #00ffa6);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body style="overflow: hidden;">

<!-- Animated Particle Background -->
<canvas id="particle-canvas" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0;"></canvas>

<div class="login-box" style="position: relative; z-index: 2;">
    <div class="title">
        EDD Governance - Operation and IT Group
    </div>
    <form id="login-form" autocomplete="off">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script src="js/particles.js"></script>
<script>
// Redirect to dashboard.html after login
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    // يمكنك إضافة تحقق هنا إذا أردت
    window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
