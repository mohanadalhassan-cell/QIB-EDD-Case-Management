<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QIB EDD System — Document Viewer</title>
  <link rel="stylesheet" href="css/edd_system.css">
  <link rel="stylesheet" href="css/accessibility_vision2030.css">
  <link rel="stylesheet" href="css/theme-light.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300D4FF'/><text x='16' y='22' font-size='16' font-weight='bold' fill='white' text-anchor='middle' font-family='system-ui'>Q</text></svg>">
</head>
<body>
  <div class="ambient-bg"></div>
  <div class="gradient-mesh"></div>
  
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" title="Dashboard">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        </a>
        <a href="edd_case.html" class="nav-item" title="EDD Cases">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
        </a>
        <a href="organization.html" class="nav-item" title="Organization">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </a>
        <a href="document_viewer.html" class="nav-item active" title="Documents">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
        </a>
        <a href="alternative_channels.html" class="nav-item" title="Alt. Channels">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 16H5V5h14v14zM7 12h2v5H7zm4-3h2v8h-2zm4-3h2v11h-2z"/></svg>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content expanded">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <button class="btn btn-secondary btn-sm" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back
          </button>
          <h1 class="page-title" id="doc-title">Document Viewer</h1>
        </div>
        <div class="header-right">
          <div class="zoom-controls">
            <button class="btn btn-secondary btn-sm" onclick="zoomOut()">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 13H5v-2h14v2z"/></svg>
            </button>
            <span id="zoom-level">100%</span>
            <button class="btn btn-secondary btn-sm" onclick="zoomIn()">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
            <button class="btn btn-secondary btn-sm" onclick="fitToPage()">Fit</button>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="downloadDoc()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download
          </button>
          <button class="btn btn-primary btn-sm" onclick="verifyDoc()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Mark Verified
          </button>
          <button class="header-btn" id="logout-btn" title="Logout">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          </button>
        </div>
      </header>

      <!-- Document Viewer -->
      <div class="page-content document-viewer-container">
        <!-- Document List Panel -->
        <div class="doc-list-panel" id="doc-list-panel">
          <div class="panel-header">
            <h3>Documents</h3>
            <button class="btn btn-sm" onclick="togglePanel()">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
          </div>
          <div class="doc-list" id="doc-list">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Document Preview -->
        <div class="doc-preview-panel">
          <div class="doc-preview" id="doc-preview">
            <div class="doc-placeholder">
              <svg viewBox="0 0 24 24" fill="currentColor" width="64" height="64" opacity="0.3"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
              <p>Select a document to preview</p>
            </div>
          </div>
        </div>

        <!-- Document Info Panel -->
        <div class="doc-info-panel" id="doc-info-panel">
          <div class="panel-header">
            <h3>Document Info</h3>
          </div>
          <div class="doc-info" id="doc-info">
            <p style="color: var(--text-muted); text-align: center; padding: 20px;">
              No document selected
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 🎯 UNIFIED SYSTEMS (New v2.0) -->
  <script src="js/path_manager.js"></script>
  <script src="js/risk_datasets.js"></script>
  <script src="js/risk_engine.js"></script>
  <script src="js/sample_data_generator.js"></script>
  <script src="js/edd_data_model.js"></script>
  <script src="js/data_bridge.js"></script>
  
  <!-- Legacy Support -->
  <script src="js/mock_data.js"></script>
  <script src="js/document_viewer.js"></script>
</body>
</html>
